<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=320">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="root">
    <header id="header">
      <div class="header-row">
        <div class="header-icon" aria-hidden="true">
          <span></span><span></span><span></span>
          <span></span><span></span><span></span>
          <span></span><span></span><span></span>
        </div>
        <div class="header-text">
          <span class="title">Grid Lens</span>
        </div>
        <div class="header-right">
          <button id="reset-btn" class="header-btn" aria-label="Reset all overlays" title="Reset all overlays"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 7a5 5 0 0 1 9-3M12 7a5 5 0 0 1-9 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M2 3v4h4M12 11V7H8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
          <button id="sidepanel-btn" class="header-btn" aria-label="Open in side panel" title="Pin to side panel"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1" y="1" width="12" height="12" rx="2" stroke="currentColor" stroke-width="1.5"/><line x1="9" y1="1" x2="9" y2="13" stroke="currentColor" stroke-width="1.5"/></svg></button>
          <button id="theme-toggle" class="theme-toggle" aria-label="Toggle day/night mode" title="Toggle day/night mode"></button>
        </div>
      </div>
    </header>

    <!-- Disabled state banner -->
    <div id="disabled-banner" class="disabled-banner" style="display:none;">
      <p>Grid Lens can't run on this page.</p>
    </div>

    <!-- Overlay Controls -->
    <section id="overlay-section" class="section">
      <div class="section-label">Overlay</div>

      <div class="control-row">
        <div class="control-label">
          <svg class="control-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
            <rect x="1" y="1" width="14" height="14" rx="2" stroke-width="1.5"/>
            <line x1="5.5" y1="1" x2="5.5" y2="15" stroke-width="1"/>
            <line x1="10.5" y1="1" x2="10.5" y2="15" stroke-width="1"/>
            <line x1="1" y1="5.5" x2="15" y2="5.5" stroke-width="1"/>
            <line x1="1" y1="10.5" x2="15" y2="10.5" stroke-width="1"/>
          </svg>
          <span>Pixel Grid</span>
        </div>
        <button id="grid-toggle" class="toggle" aria-label="Toggle pixel grid">
          <span class="toggle-knob"></span>
        </button>
      </div>

      <div id="grid-size-row" class="pill-row" style="display:none;">
        <button class="pill" data-mode="pixel" data-size="4">4px</button>
        <button class="pill active" data-mode="pixel" data-size="8">8px</button>
        <button class="pill" data-mode="pixel" data-size="16">16px</button>
        <button class="pill pill-sep" data-mode="baseline">Base</button>
        <button class="pill" data-mode="columns" data-size="12">12col</button>
      </div>

      <div class="control-row">
        <div class="control-label">
          <svg class="control-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
            <rect x="1" y="1" width="14" height="14" rx="2" stroke-width="1.5"/>
            <rect x="4" y="4" width="8" height="8" rx="1" stroke-width="1" stroke-dasharray="2 1"/>
          </svg>
          <span>Element Boxes</span>
        </div>
        <button id="boxes-toggle" class="toggle" aria-label="Toggle element boxes">
          <span class="toggle-knob"></span>
        </button>
      </div>

      <div class="control-row">
        <div class="control-label">
          <svg class="control-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
            <rect x="1" y="1" width="14" height="14" rx="2" stroke-width="1.5"/>
            <circle cx="8" cy="8" r="2" stroke-width="1.5"/>
            <line x1="8" y1="3" x2="8" y2="5" stroke-width="1"/>
            <line x1="8" y1="11" x2="8" y2="13" stroke-width="1"/>
            <line x1="3" y1="8" x2="5" y2="8" stroke-width="1"/>
            <line x1="11" y1="8" x2="13" y2="8" stroke-width="1"/>
          </svg>
          <span>Inspect</span>
        </div>
        <button id="inspect-toggle" class="toggle" aria-label="Toggle hover inspect">
          <span class="toggle-knob"></span>
        </button>
      </div>

      <div class="control-row">
        <div class="control-label">
          <svg class="control-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
            <rect x="1" y="1" width="14" height="14" rx="2" stroke-width="1.5"/>
            <line x1="5" y1="1" x2="5" y2="3" stroke-width="1"/>
            <line x1="9" y1="1" x2="9" y2="3" stroke-width="1"/>
            <line x1="13" y1="1" x2="13" y2="3" stroke-width="1"/>
            <line x1="1" y1="5" x2="3" y2="5" stroke-width="1"/>
            <line x1="1" y1="9" x2="3" y2="9" stroke-width="1"/>
            <line x1="1" y1="13" x2="3" y2="13" stroke-width="1"/>
          </svg>
          <span>Rulers</span>
        </div>
        <button id="rulers-toggle" class="toggle" aria-label="Toggle rulers">
          <span class="toggle-knob"></span>
        </button>
      </div>
    </section>

    <section class="section" style="padding-top:0;">
      <button id="extract-btn" class="btn-extract">Extract Design Tokens</button>
    </section>

    <div class="divider"></div>

    <!-- Hint for first-time users -->
    <div id="hint" class="hint">
      <div class="hint-icon">◉</div>
      Scan this page's typography and color palette.
      <br>Results appear here after extraction.
    </div>

    <!-- Typography (populated after extraction) -->
    <section id="typo-section" class="section" style="display:none;">
      <div class="section-label">Typography</div>
      <div id="typo-list"></div>
    </section>

    <!-- Colors (populated after extraction) -->
    <section id="color-section" class="section" style="display:none;">
      <div class="section-label">Colors</div>
      <div id="color-list"></div>
    </section>

    <!-- Actions (always visible) -->
    <section id="actions-section" class="section">
      <div class="export-row">
        <button id="select-btn" class="btn-primary">Measure</button>
        <button id="pick-code-btn" class="btn-secondary">Pick → Code</button>
      </div>
    </section>

    <!-- Export (after extraction) -->
    <section id="export-section" class="section" style="display:none;">
      <div class="export-row">
        <button id="download-btn" class="btn-primary">Export .md</button>
        <button id="copy-btn" class="btn-secondary">Copy</button>
      </div>
    </section>
  </div>
  <script src="../utils/markdown.js"></script>
  <script src="popup.js"></script>
</body>
</html>
